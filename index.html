<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/my-website/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-website</title>
    <script type="module" crossorigin src="/my-website/assets/index-CTZUUZso.js"></script>
    <link rel="stylesheet" crossorigin href="/my-website/assets/index-Bv-q2-aV.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- STORAGE_KEY for theme must match `src/lib/theme.ts` (`theme`) -->
    <script>
      ;(function () {
        var key = 'theme'
        var raw = null
        try {
          raw = localStorage.getItem(key)
        } catch (e) {}
        var theme =
          raw === 'light' || raw === 'dark'
            ? raw
            : null
        if (raw !== null && theme === null) {
          try {
            localStorage.removeItem(key)
          } catch (e) {}
        }
        if (!theme) {
          theme =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        }
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </body>
</html>
